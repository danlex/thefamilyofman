name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - 'research/**'
      - 'sources/**'
      - 'scripts/sync_mindmap.sh'
      - 'scripts/compute_progress.sh'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Sync research/mindmap.md → site/mindmap.md
        working-directory: .
        run: bash scripts/sync_mindmap.sh

      - name: Sync data/*.csv → site/_data/ and sources → site/_sources/
        working-directory: .
        run: bash scripts/sync_site_data.sh

      - name: Generate per-photograph pages
        working-directory: .
        run: python3 scripts/generate_photograph_pages.py

      - name: Compute site/_data/progress.yml
        working-directory: .
        run: bash scripts/compute_progress.sh

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: site

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
